; Merged into each session trse.ini for keys not already present (after host copy).
; TRSE CIniFile only accepts lines with key = value. Use ; for comments.
; PHP strips # lines before TRSE reads the file.

assembler_6809 = OrgAsm

; x86 / DOS targets: path to NASM (Docker image installs it at /usr/bin/nasm)
nasm = /usr/bin/nasm
